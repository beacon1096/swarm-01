---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - # Talos II: cluster-specific variable overrides
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          postBuild:
            substitute:
              POD_CIDR: "10.44.0.0/16"
              ENVOY_EXTERNAL_IP: "10.20.0.200"
              ENVOY_INTERNAL_IP: "10.20.0.201"
              K8S_GATEWAY_IP: "10.20.0.202"
              FLUX_SYNC_PATH: "kubernetes/flux/talos-ii"
              ENVOY_GATEWAY_OCI_REGISTRY: "mirror.gcr.io"
              ENVOY_GATEWAY_REGISTRY: "registry.beaco.works/docker.io"
              ENVOY_IMAGE_REPO: "registry.beaco.works/docker.io/envoyproxy/envoy"
              ZOT_LB_IP: "10.20.0.203"
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - # envoy-gateway: skip CRD install (Gateway API v1.5.1 already installed, chart bundles older ones)
      target:
        kind: Kustomization
        name: envoy-gateway
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: envoy-gateway
              spec:
                install:
                  crds: Skip
                upgrade:
                  crds: Skip
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
              name: envoy-gateway
    # --- Talos II: Bitnami PostgreSQL image override (digest-pinned images can't be pulled through Zot mirror) ---
    - target:
        kind: Kustomization
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: _
              spec:
                values:
                  global:
                    security:
                      allowInsecureImages: true
                  image:
                    registry: registry.beaco.works
                    repository: docker.io/bitnami/postgresql
                    tag: pg16
                    digest: ""
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
              name: ".*-postgresql"
    # --- Talos II: use ms01 Harvester CSI config instead of NEC8 ---
    - target:
        kind: Kustomization
        name: harvester-csi-driver
      patch: |
        - op: replace
          path: /spec/path
          value: ./kubernetes/apps/kube-system/harvester-csi-driver/talos-ii
    # --- Talos II: Spegel mirror targets local Zot LB ---
    - target:
        kind: Kustomization
        name: spegel
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: spegel
              spec:
                values:
                  spegel:
                    additionalMirrorTargets:
                      - http://10.20.0.203:5000
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
              name: spegel
    # --- Talos II: suspend apps not needed on this cluster ---
    - target:
        kind: Kustomization
        name: "(forgejo-runner|uptime-kuma|victoria-logs|victoria-logs-collector|victoria-metrics)"
      patch: |
        - op: add
          path: /spec/suspend
          value: true
    - # Talos II: external-dns txtOwnerId
      target:
        kind: Kustomization
        name: cloudflare-dns
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: cloudflare-dns
              spec:
                values:
                  txtOwnerId: talos-ii
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
              name: cloudflare-dns
