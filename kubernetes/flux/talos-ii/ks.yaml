---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - # Talos II: cluster-specific variable overrides
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          postBuild:
            substitute:
              POD_CIDR: "10.44.0.0/16"
              ENVOY_EXTERNAL_IP: "10.20.0.200"
              ENVOY_INTERNAL_IP: "10.20.0.201"
              K8S_GATEWAY_IP: "10.20.0.202"
              FLUX_SYNC_PATH: "kubernetes/flux/talos-ii"
              ENVOY_GATEWAY_OCI_REGISTRY: "registry.beaco.works"
              ENVOY_GATEWAY_REGISTRY: "registry.beaco.works/docker.io"
              ENVOY_IMAGE_REPO: "registry.beaco.works/docker.io/envoyproxy/envoy"
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    # --- Talos II: suspend apps not needed on this cluster ---
    - target:
        kind: Kustomization
        name: "(ai|attic|atuin|authentik|cilium|coder|coredns|echo|eliza|forgejo|forgejo-operator|forgejo-runner|harvester-csi-driver|matrix|mattermost|mem0|sing-box|spegel|uptime-kuma|vaultwarden|victoria-logs|victoria-logs-collector|victoria-metrics|zot)"
      patch: |
        - op: add
          path: /spec/suspend
          value: true
