---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - # Talos I: suspend apps that only run on Talos II
      target:
        kind: Kustomization
        name: "(zot|home-assistant|immich|navidrome|matrix|mem0|eliza|zeroclaw|authentik|vaultwarden|coder|atuin|attic|forgejo|n8n)"
      patch: |
        - op: add
          path: /spec/suspend
          value: true
    - # Talos I: remove Spegel additional mirror (Zot migrated to Talos II)
      target:
        kind: Kustomization
        name: spegel
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: spegel
              spec:
                values:
                  spegel:
                    additionalMirrorTargets: []
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
              name: spegel
    - # Talos I: Cilium IP pool for NEC8 network
      target:
        kind: Kustomization
        name: cilium
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: cilium.io/v2alpha1
              kind: CiliumLoadBalancerIPPool
              metadata:
                name: pool
              spec:
                allowFirstLastIPs: "No"
                blocks:
                  - cidr: "172.16.107.0/24"
            target:
              group: cilium.io
              kind: CiliumLoadBalancerIPPool
              name: pool
    - # Talos I: external-dns txtOwnerId
      target:
        kind: Kustomization
        name: cloudflare-dns
      patch: |
        - op: add
          path: /spec/patches/-
          value:
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: cloudflare-dns
              spec:
                values:
                  txtOwnerId: talos-i
            target:
              group: helm.toolkit.fluxcd.io
              kind: HelmRelease
              name: cloudflare-dns
    - # Talos I: suspend cloudflare-tunnel (use talos-ii only)
      target:
        kind: Kustomization
        name: cloudflare-tunnel
      patch: |
        - op: add
          path: /spec/suspend
          value: true
    
