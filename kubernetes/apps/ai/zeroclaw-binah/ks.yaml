---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zeroclaw-binah
  namespace: ai
spec:
  interval: 10m
  path: ./kubernetes/apps/ai/zeroclaw-binah/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
