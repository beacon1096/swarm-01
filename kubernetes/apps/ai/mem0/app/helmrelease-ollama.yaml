---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mem0-ollama
spec:
  chartRef:
    kind: OCIRepository
    name: mem0
  interval: 1h
  timeout: 15m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      terminationGracePeriodSeconds: 30
    controllers:
      ollama:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: latest
            env:
              OLLAMA_HOST: "0.0.0.0"
            ports:
              - containerPort: 11434
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 4Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
        initContainers:
          pull-model:
            image:
              repository: docker.io/ollama/ollama
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                /bin/ollama serve &
                sleep 5
                ollama pull nomic-embed-text
                kill %1 2>/dev/null || true
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 4Gi
    service:
      app:
        controller: ollama
        ports:
          http:
            port: 11434
    persistence:
      data:
        enabled: true
        storageClass: harvester
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /root/.ollama
