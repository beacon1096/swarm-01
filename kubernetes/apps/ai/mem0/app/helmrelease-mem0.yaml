---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mem0
spec:
  chartRef:
    kind: OCIRepository
    name: mem0
  interval: 1h
  install:
    disableWait: true
  upgrade:
    disableWait: true
  dependsOn:
    - name: mem0-postgresql
    - name: mem0-neo4j
    - name: mem0-ollama
  values:
    controllers:
      mem0:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: docker.io/mem0/mem0-api-server
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                pip install ollama "psycopg[binary,pool]" langchain-neo4j rank-bm25 --quiet && exec uvicorn main:app --host 0.0.0.0 --port 8000
            env:
              POSTGRES_HOST: mem0-postgresql
              POSTGRES_PORT: "5432"
              POSTGRES_DB: mem0
              POSTGRES_USER: mem0
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mem0-secret
                    key: pg-password
              NEO4J_URI: bolt://mem0-neo4j:7687
              NEO4J_USERNAME: neo4j
              NEO4J_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mem0-secret
                    key: neo4j-password
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: mem0-secret
                    key: omlx-api-key
              OPENAI_BASE_URL: "http://omlx-llm.mem0.svc.cluster.local:12306/v1"
              LLM_PROVIDER: openai
              LLM_MODEL: Qwen3-30B-A3B-Instruct-2507-MLX-4bit
              EMBEDDER_PROVIDER: ollama
              EMBEDDER_MODEL: nomic-embed-text
              OLLAMA_BASE_URL: "http://mem0-ollama:11434"
            ports:
              - containerPort: 8000
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
    service:
      app:
        controller: mem0
        ports:
          http:
            port: 8000
    persistence:
      main-py:
        type: configMap
        name: mem0-main-py
        globalMounts:
          - path: /app/main.py
            subPath: main.py
            readOnly: true
      history:
        type: emptyDir
        globalMounts:
          - path: /app/history
