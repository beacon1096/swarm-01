---
apiVersion: v1
kind: Service
metadata:
  name: memoh-postgres
spec:
  selector:
    app: memoh-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: memoh-qdrant
spec:
  selector:
    app: memoh-qdrant
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: memoh-server
spec:
  selector:
    app: memoh-server
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
# Alias 'server' so the web container's nginx (hardcoded to http://server:8080) works
apiVersion: v1
kind: Service
metadata:
  name: server
spec:
  selector:
    app: memoh-server
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: memoh-web
spec:
  selector:
    app: memoh-web
  ports:
    - port: 8082
      targetPort: 8082
      name: http
