---
apiVersion: v1
kind: ConfigMap
metadata:
  name: memoh-config-template
data:
  gen-config.sh: |
    #!/bin/sh
    cat > /config/config.toml << TOMLEOF
    [log]
    level = "info"
    format = "text"

    [server]
    addr = "0.0.0.0:8080"

    [admin]
    username = "admin"
    password = "$${MEMOH_ADMIN_PASSWORD}"
    email = "admin@memoh.local"

    [auth]
    jwt_secret = "$${MEMOH_JWT_SECRET}"
    jwt_expires_in = "168h"
    timezone = "Asia/Shanghai"

    [containerd]
    socket_path = "/run/containerd/containerd.sock"
    namespace = "default"

    [workspace]
    default_image = "debian:bookworm-slim"
    snapshotter = "overlayfs"
    data_root = "/opt/memoh/data"
    runtime_dir = "/opt/memoh/runtime"

    [postgres]
    host = "memoh-postgres"
    port = 5432
    user = "memoh"
    password = "$${MEMOH_DB_PASSWORD}"
    database = "memoh"
    sslmode = "disable"

    [qdrant]
    base_url = "http://memoh-qdrant:6334"
    api_key = ""
    timeout_seconds = 10
    TOMLEOF
    echo "Config written to /config/config.toml"
