---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memoh-postgres
  labels:
    app: memoh-postgres
spec:
  serviceName: memoh-postgres
  replicas: 1
  selector:
    matchLabels:
      app: memoh-postgres
  template:
    metadata:
      labels:
        app: memoh-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          env:
            - name: POSTGRES_USER
              value: memoh
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_DB_PASSWORD
            - name: POSTGRES_DB
              value: memoh
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "memoh", "-d", "memoh"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "memoh", "-d", "memoh"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: harvester
        resources:
          requests:
            storage: 5Gi
