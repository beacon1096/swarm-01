---
apiVersion: batch/v1
kind: Job
metadata:
  name: memoh-migrate
  annotations:
    # Re-run migration on every Flux reconcile that changes this Job
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z memoh-postgres 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
              echo "Postgres is ready"
      containers:
        - name: migrate
          image: memohai/server:latest
          command: ["/app/memoh-server", "migrate", "up"]
          env:
            - name: MEMOH_DB_HOST
              value: memoh-postgres
            - name: MEMOH_DB_PORT
              value: "5432"
            - name: MEMOH_DB_USER
              value: memoh
            - name: MEMOH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_DB_PASSWORD
            - name: MEMOH_DB_NAME
              value: memoh
            - name: MEMOH_DB_SSLMODE
              value: disable
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
