---
apiVersion: batch/v1
kind: Job
metadata:
  name: memoh-migrate
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command: ["/bin/sh", "/scripts/gen-config.sh"]
          env:
            - name: MEMOH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_DB_PASSWORD
            - name: MEMOH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_JWT_SECRET
            - name: MEMOH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config
              mountPath: /config
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z memoh-postgres 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
              echo "Postgres is ready"
      containers:
        - name: migrate
          image: memohai/server:latest
          # memoh-server reads config from CWD (/app/config.toml), not MEMOH_CONFIG
          command:
            - sh
            - -c
            - |
              cp /config/config.toml /app/config.toml
              exec /app/memoh-server migrate up
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: memoh-config-template
            defaultMode: 0755
        - name: config
          emptyDir: {}
