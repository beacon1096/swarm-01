---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-server
  labels:
    app: memoh-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: memoh-server
  template:
    metadata:
      labels:
        app: memoh-server
    spec:
      hostPID: true
      initContainers:
        - name: config-gen
          image: busybox:1.37
          command: ["/bin/sh", "/scripts/gen-config.sh"]
          env:
            - name: MEMOH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_DB_PASSWORD
            - name: MEMOH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_JWT_SECRET
            - name: MEMOH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config
              mountPath: /config
        - name: wait-postgres
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z memoh-postgres 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
              echo "Postgres ready"
      containers:
        - name: server
          image: memohai/server:latest
          securityContext:
            privileged: true
          # Bypass the entrypoint.sh cgroup delegation loop that hangs on Talos.
          # Instead: set ip_forward, start containerd directly, wait, then serve.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true
              ip link delete cni0 2>/dev/null || true
              rm -rf /var/lib/cni/networks/* /var/lib/cni/results/* 2>/dev/null || true
              mkdir -p /run/containerd
              containerd &
              CONTAINERD_PID=$!
              echo "Waiting for containerd..."
              for i in $(seq 1 60); do
                if ctr version >/dev/null 2>&1; then break; fi
                sleep 1
              done
              ctr version || { echo "containerd failed to start"; exit 1; }
              echo "containerd ready, starting memoh-server..."
              cp /config/config.toml /app/config.toml
              exec /app/memoh-server serve
          env:
            - name: HTTP_PROXY
              value: http://sing-box.network.svc.cluster.local:7890
            - name: HTTPS_PROXY
              value: http://sing-box.network.svc.cluster.local:7890
            - name: NO_PROXY
              value: localhost,127.0.0.1,10.0.0.0/8,.cluster.local,.svc,memoh-postgres,memoh-qdrant
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /opt/memoh/data
            - name: containerd-state
              mountPath: /var/lib/containerd
          livenessProbe:
            exec:
              command: ["sh", "-c", "wget -q -S --method=HEAD -O/dev/null http://localhost:8080/health 2>&1 | grep -E '200|204|301'"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "wget -q -S --method=HEAD -O/dev/null http://localhost:8080/health 2>&1 | grep -E '200|204|301'"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: scripts
          configMap:
            name: memoh-config-template
            defaultMode: 0755
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: memoh-server-data
        - name: containerd-state
          persistentVolumeClaim:
            claimName: memoh-containerd-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoh-server-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoh-containerd-state
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 10Gi
