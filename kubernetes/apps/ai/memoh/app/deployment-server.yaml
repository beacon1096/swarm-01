---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-server
  labels:
    app: memoh-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: memoh-server
  template:
    metadata:
      labels:
        app: memoh-server
    spec:
      hostPID: true
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command: ["/bin/sh", "/scripts/gen-config.sh"]
          env:
            - name: MEMOH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_DB_PASSWORD
            - name: MEMOH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: MEMOH_JWT_SECRET
            - name: MEMOH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config
              mountPath: /config
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z memoh-postgres 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
              echo "Postgres ready"
      containers:
        - name: server
          image: memohai/server:latest
          securityContext:
            privileged: true
          env:
            - name: MEMOH_CONFIG
              value: /config/config.toml
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /opt/memoh/data
            - name: containerd-state
              mountPath: /var/lib/containerd
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: scripts
          configMap:
            name: memoh-config-template
            defaultMode: 0755
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: memoh-server-data
        - name: containerd-state
          persistentVolumeClaim:
            claimName: memoh-containerd-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoh-server-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoh-containerd-state
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 10Gi
