---
apiVersion: v1
kind: Service
metadata:
  name: zeroclaw-malkuth-tailscale
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "zeroclaw-malkuth"
spec:
  type: ClusterIP
  selector:
    app: zeroclaw-malkuth
  ports:
    - name: http
      port: 42617
      targetPort: 42617
      protocol: TCP
