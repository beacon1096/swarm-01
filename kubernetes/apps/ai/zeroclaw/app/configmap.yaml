---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
data:
  config.toml: |
    default_provider = "custom:http://omlx-llm.ai.svc.cluster.local:12306/v1"
    default_model = "Qwen3.5-35B-A3B-4bit"
    default_temperature = 0.7
    api_key = "P0o9i8u7y6t5123"

    [channels_config]
    cli = false

    [channels_config.matrix]
    homeserver = "http://matrix-synapse.collaboration.svc.cluster.local:8008"
    access_token = "syt_YWdlbnQtdGVjaG5pY2lhbg_UsxDfANkbjtUVNRZnPIo_2PQQ6s"
    user_id = "@agent-technician:beaco.works"
    room_id = "#bot:beaco.works"
    allowed_users = ["*"]

  entrypoint.sh: |
    #!/bin/bash
    set -e
    
    # Start TigerFS in NFS mode (no FUSE required)
    # NFS mode works without fusermount and is cross-platform
    mkdir -p /zeroclaw-data/.zeroclaw/skills
    tigerfs mount --nfs "postgres://tigerfs:${TIGERFS_PASSWORD}@tigerfs-postgresql:5432/tigerfs" /zeroclaw-data/.zeroclaw/skills &
    TIGERFS_PID=$!
    
    # Wait for TigerFS NFS to be ready
    sleep 5
    for i in $(seq 1 30); do
      if ls /zeroclaw-data/.zeroclaw/skills >/dev/null 2>&1; then
        break
      fi
      echo "Waiting for TigerFS NFS... ($i/30)"
      sleep 1
      if ! kill -0 $TIGERFS_PID 2>/dev/null; then
        echo "TigerFS died, exiting"
        exit 1
      fi
    done
    
    if ! ls /zeroclaw-data/.zeroclaw/skills >/dev/null 2>&1; then
      echo "TigerFS NFS failed after 30 seconds"
      exit 1
    fi
    
    echo "TigerFS NFS mounted successfully"
    
    # Create skills app with history enabled
    mkdir -p /zeroclaw-data/.zeroclaw/skills/.build
    if [ ! -f /zeroclaw-data/.zeroclaw/skills/.build/.initialized ]; then
      echo "markdown,history" > /zeroclaw-data/.zeroclaw/skills/.build/technician
      touch /zeroclaw-data/.zeroclaw/skills/.build/.initialized
    fi
    
    # Start zeroclaw
    exec zeroclaw channel start
