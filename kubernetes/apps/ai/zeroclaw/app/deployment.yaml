---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  labels:
    app: zeroclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeroclaw
  template:
    metadata:
      labels:
        app: zeroclaw
    spec:
      initContainers:
      - name: install-tigerfs
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          apk add --no-cache curl
          curl -fsSL https://install.tigerfs.io | sh
          cp /usr/local/bin/tigerfs /tigerfs-bin/
        volumeMounts:
        - name: tigerfs-bin
          mountPath: /tigerfs-bin

      containers:
      - name: zeroclaw
        image: ghcr.io/zeroclaw-labs/zeroclaw:v0.6.2-debian
        command: ["/bin/bash", "/scripts/entrypoint.sh"]
        env:
        - name: TIGERFS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tigerfs-postgresql
              key: password
        securityContext:
          privileged: true
        volumeMounts:
        - name: config
          mountPath: /zeroclaw-data/.zeroclaw/config.toml
          subPath: config.toml
        - name: config
          mountPath: /scripts/entrypoint.sh
          subPath: entrypoint.sh
        - name: tigerfs-bin
          mountPath: /usr/local/bin/tigerfs
          subPath: tigerfs
        - name: state
          mountPath: /zeroclaw-data/.zeroclaw/state
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      volumes:
      - name: config
        configMap:
          name: zeroclaw-config
          defaultMode: 0755
      - name: tigerfs-bin
        emptyDir: {}
      - name: state
        persistentVolumeClaim:
          claimName: zeroclaw-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zeroclaw-state
  labels:
    app: zeroclaw
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 1Gi
