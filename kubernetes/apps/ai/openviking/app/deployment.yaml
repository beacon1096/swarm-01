---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking
  labels:
    app: openviking
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openviking
  template:
    metadata:
      labels:
        app: openviking
    spec:
      containers:
        - name: openviking
          image: ghcr.io/volcengine/openviking:main
          ports:
            - containerPort: 1933
              name: http
          env:
            - name: OPENVIKING_VLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
            - name: OPENVIKING_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
          volumeMounts:
            - name: config
              mountPath: /root/.openviking/ov.conf
              subPath: ov.conf
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: openviking-config
        - name: data
          persistentVolumeClaim:
            claimName: openviking-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openviking-data
  labels:
    app: openviking
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openviking
spec:
  type: ClusterIP
  selector:
    app: openviking
  ports:
    - name: http
      port: 1933
      targetPort: 1933
      protocol: TCP
