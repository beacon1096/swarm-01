---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking
  labels:
    app: openviking
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openviking
  template:
    metadata:
      labels:
        app: openviking
    spec:
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command: ["/bin/sh", "/scripts/gen-config.sh"]
          env:
            - name: OPENVIKING_VLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
            - name: OPENVIKING_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cluster-secrets
                  key: ZEROCLAW_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config-gen
              mountPath: /config
      containers:
        - name: openviking
          image: ghcr.io/volcengine/openviking:main
          ports:
            - containerPort: 1933
              name: http
          env:
            - name: OPENVIKING_CONFIG_FILE
              value: /config/ov.conf
          volumeMounts:
            - name: config-gen
              mountPath: /config
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: scripts
          configMap:
            name: openviking-config-template
            defaultMode: 0755
        - name: config-gen
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: openviking-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openviking-data
  labels:
    app: openviking
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: harvester
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openviking
spec:
  type: ClusterIP
  selector:
    app: openviking
  ports:
    - name: http
      port: 1933
      targetPort: 1933
      protocol: TCP
