---
apiVersion: v1
kind: Service
metadata:
  name: openviking-tailscale
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "openviking"
spec:
  type: ClusterIP
  selector:
    app: openviking
  ports:
    - name: http
      port: 1933
      targetPort: 1933
      protocol: TCP
