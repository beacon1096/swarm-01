---
# omlx-llm is an ExternalName service on Talos I pointing to the Tailscale sidecar.
# On Talos II that sidecar doesn't exist, so we provide a direct endpoint to the
# Tailscale IP of the oMLX host (100.99.236.96).
apiVersion: v1
kind: Service
metadata:
  name: omlx-llm
spec:
  clusterIP: None
  ports:
    - port: 12306
      targetPort: 12306
      name: http
---
apiVersion: v1
kind: Endpoints
metadata:
  name: omlx-llm
subsets:
  - addresses:
      - ip: 100.99.236.96
    ports:
      - port: 12306
        name: http
