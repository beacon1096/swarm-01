---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eliza
  labels:
    app: eliza
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eliza
  template:
    metadata:
      labels:
        app: eliza
    spec:
      containers:
      - name: eliza
        image: zot.registry.svc.cluster.local:5000/custom/eliza-runtime:1.7.2-matrix-mem0-amd64-20260316a
        imagePullPolicy: Always
        command: ["bun", "run", "/app/node_modules/@elizaos/cli/dist/index.js", "start", "--character=/app/characters/character.json"]
        env:
        - name: POSTGRES_URL
          value: "postgresql://eliza:eliza_password@postgres-eliza:5432/eliza"
        - name: MEM0_API_BASE
          value: "http://mem0:8000"
        - name: MEM0_AUTO_SAVE
          value: "true"
        - name: MEM0_SCOPE_MODE
          value: "agent"
        - name: MATRIX_SERVER_URL
          value: "http://matrix-synapse.collaboration.svc.cluster.local:8008"
        - name: MATRIX_HOMESERVER
          value: "http://matrix-synapse.collaboration.svc.cluster.local:8008"
        - name: MATRIX_USER_ID
          value: "@agent-technician:beaco.works"
        - name: MATRIX_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: ELIZA_MATRIX_ACCESS_TOKEN
        - name: MATRIX_AUTO_JOIN
          value: "true"
        - name: OPENAI_BASE_URL
          value: "http://omlx-llm.ai.svc.cluster.local:12306/v1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: ELIZA_OPENAI_API_KEY
        - name: OPENAI_SMALL_MODEL
          value: "Qwen3.5-35B-A3B-4bit"
        - name: OPENAI_LARGE_MODEL
          value: "Qwen3.5-35B-A3B-4bit"
        - name: OPENAI_EMBEDDING_URL
          value: "http://mem0-ollama:11434/v1"
        - name: OPENAI_EMBEDDING_MODEL
          value: "nomic-embed-text"
        - name: OPENAI_EMBEDDING_DIMENSIONS
          value: "768"
        - name: NODE_ENV
          value: "production"
        volumeMounts:
        - name: character-config
          mountPath: /app/characters/character.json
          subPath: character.json
      volumes:
      - name: character-config
        configMap:
          name: eliza-character
---
apiVersion: v1
kind: Service
metadata:
  name: eliza
  labels:
    app: eliza
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: eliza
