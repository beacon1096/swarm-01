---
apiVersion: v1
kind: Service
metadata:
  name: postgres-eliza
  labels:
    app: postgres-eliza
spec:
  ports:
    - port: 5432
      name: postgres
  clusterIP: None
  selector:
    app: postgres-eliza
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-eliza
spec:
  selector:
    matchLabels:
      app: postgres-eliza
  serviceName: "postgres-eliza"
  replicas: 1
  template:
    metadata:
      labels:
        app: postgres-eliza
    spec:
      containers:
      - name: postgres
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: eliza
        - name: POSTGRES_PASSWORD
          value: eliza_password # For production, use SOPS secret
        - name: POSTGRES_DB
          value: eliza
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
