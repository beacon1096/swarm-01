---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-tailscale
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "homeassistant"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/controller: home-assistant
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      protocol: TCP
