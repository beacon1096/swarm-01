---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
spec:
  chart:
    spec:
      chart: mattermost-team-edition
      version: 6.6.93
      sourceRef:
        kind: HelmRepository
        name: mattermost-charts
  interval: 1h
  values:
    image:
      repository: mattermost/mattermost-team-edition
      tag: 11.4.2
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    mysql:
      enabled: false
    externalDB:
      enabled: true
      externalDriverType: postgres
      externalConnectionString: "mattermost:mattermost-pg@mattermost-postgresql:5432/mattermost?sslmode=disable&connect_timeout=10"
    persistence:
      data:
        enabled: true
        storageClass: harvester
        size: 10Gi
      plugins:
        enabled: true
        storageClass: harvester
        size: 1Gi
    ingress:
      enabled: false
    extraEnvVars:
      - name: MM_SERVICESETTINGS_SITEURL
        value: "https://chat.${SECRET_DOMAIN}"
      # -- Authentik OIDC via GitLab provider (Mattermost's generic OIDC path)
      - name: MM_GITLABSETTINGS_ENABLE
        value: "true"
      - name: MM_GITLABSETTINGS_AUTHENDPOINT
        value: "https://id.${SECRET_DOMAIN}/application/o/mattermost/authorize/"
      - name: MM_GITLABSETTINGS_TOKENENDPOINT
        value: "https://id.${SECRET_DOMAIN}/application/o/mattermost/token/"
      - name: MM_GITLABSETTINGS_USERAPIENDPOINT
        value: "https://id.${SECRET_DOMAIN}/application/o/userinfo/"
      - name: MM_GITLABSETTINGS_ID
        valueFrom:
          secretKeyRef:
            name: mattermost-authentik-secret
            key: client-id
      - name: MM_GITLABSETTINGS_SECRET
        valueFrom:
          secretKeyRef:
            name: mattermost-authentik-secret
            key: client-secret
      - name: MM_GITLABSETTINGS_BUTTONTEXT
        value: "Sign in with Authentik"
      - name: MM_SERVICESETTINGS_ALLOWEDUNTRUSTEDINTERNALCONNECTIONS
        value: ""
      - name: MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL
        value: "false"
      - name: MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL
        value: "true"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
