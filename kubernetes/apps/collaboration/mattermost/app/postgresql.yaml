---
# Standalone PostgreSQL for Mattermost (Bitnami chart bundled as raw manifests
# is too complex; using a simple StatefulSet with official postgres image instead)
apiVersion: v1
kind: Service
metadata:
  name: mattermost-postgresql
spec:
  selector:
    app: mattermost-postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mattermost-postgresql
spec:
  selector:
    matchLabels:
      app: mattermost-postgresql
  serviceName: mattermost-postgresql
  replicas: 1
  template:
    metadata:
      labels:
        app: mattermost-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: mattermost
            - name: POSTGRES_DB
              value: mattermost
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mattermost-pg-secret
                  key: SECRET_MATTERMOST_PG_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mattermost"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: harvester
        resources:
          requests:
            storage: 8Gi
