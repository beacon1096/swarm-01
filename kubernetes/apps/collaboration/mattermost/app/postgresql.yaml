---
# Standalone PostgreSQL for Mattermost (Bitnami chart bundled as raw manifests
# is too complex; using a simple StatefulSet with official postgres image instead)
apiVersion: v1
kind: Service
metadata:
  name: mattermost-postgresql
spec:
  selector:
    app: mattermost-postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mattermost-postgresql
spec:
  selector:
    matchLabels:
      app: mattermost-postgresql
  serviceName: mattermost-postgresql
  replicas: 1
  template:
    metadata:
      labels:
        app: mattermost-postgresql
    spec:
      containers:
        - name: postgresql
          image: docker.io/bitnami/postgresql:latest
          env:
            - name: POSTGRESQL_USERNAME
              value: mattermost
            - name: POSTGRESQL_DATABASE
              value: mattermost
            - name: POSTGRESQL_PASSWORD
              value: mattermost-pg
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mattermost", "-d", "mattermost"]
            initialDelaySeconds: 15
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: harvester
        resources:
          requests:
            storage: 8Gi
