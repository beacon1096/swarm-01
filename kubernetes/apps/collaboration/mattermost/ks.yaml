---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mattermost
spec:
  interval: 1h
  path: ./kubernetes/apps/collaboration/mattermost/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: mattermost-pg-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: collaboration
  wait: false
