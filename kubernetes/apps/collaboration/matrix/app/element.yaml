---
apiVersion: v1
kind: ConfigMap
metadata:
  name: element-web-config
data:
  config.json: |
    {
      "default_server_config": {
        "m.homeserver": {
          "base_url": "https://matrix.beaco.works",
          "server_name": "beaco.works"
        }
      },
      "brand": "Element",
      "integrations_ui_url": "",
      "integrations_rest_url": "",
      "integrations_widgets_urls": [],
      "bug_report_endpoint_url": "",
      "defaultCountryCode": "CN",
      "showLabsSettings": false,
      "features": {},
      "default_federate": false,
      "default_theme": "light",
      "room_directory": {
        "servers": ["beaco.works"]
      },
      "enable_presence_by_hs_url": {
        "https://matrix.beaco.works": false
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: element-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: element-web
  template:
    metadata:
      labels:
        app: element-web
    spec:
      containers:
        - name: element-web
          image: ghcr.io/element-hq/element-web:v1.12.15
          ports:
            - containerPort: 80
          env:
            - name: ELEMENT_WEB_PORT
              value: "80"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: element-web-config
---
apiVersion: v1
kind: Service
metadata:
  name: element-web
spec:
  selector:
    app: element-web
  ports:
    - port: 80
      targetPort: 80
