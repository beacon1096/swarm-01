---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
spec:
  chart:
    spec:
      chart: zot
      version: "0.1.98"
      sourceRef:
        kind: HelmRepository
        name: zot
  interval: 1h
  values:
    replicaCount: 1
    service:
      type: LoadBalancer
      port: 5000
      annotations:
        lbipam.cilium.io/ips: "172.16.107.41"
    ingress:
      enabled: false
    persistence:
      enabled: true
      storageClass: harvester
      size: 50Gi
      accessMode: ReadWriteOnce
    mountConfig: true
    mountSecret: true
    configFiles:
      config.json: |-
        {
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "gc": true
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "auth": { "htpasswd": { "path": "/secret/htpasswd" } },
            "accessControl": {
              "repositories": {
                "**": {
                  "policies": [
                    { "users": ["admin"], "actions": ["read","create","update","delete"] }
                  ],
                  "anonymousPolicy": ["read"]
                }
              }
            }
          },
          "log": { "level": "info" },
          "extensions": {
            "sync": {
              "registries": [
                {
                  "urls": ["https://ghcr.io"],
                  "content": [{ "prefix": "**", "destination": "/ghcr.io" }],
                  "onDemand": true, "tlsVerify": true
                },
                {
                  "urls": ["https://quay.io"],
                  "content": [{ "prefix": "**", "destination": "/quay.io" }],
                  "onDemand": true, "tlsVerify": true
                },
                {
                  "urls": ["https://docker.elastic.co"],
                  "content": [{ "prefix": "**", "destination": "/elastic.co" }],
                  "onDemand": true, "tlsVerify": true
                }
              ]
            },
            "search": { "enable": true },
            "ui": { "enable": true }
          }
        }
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
