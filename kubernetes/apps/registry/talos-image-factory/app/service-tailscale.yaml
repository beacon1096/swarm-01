---
apiVersion: v1
kind: Service
metadata:
  name: talos-image-factory-tailscale
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "talos-image-factory"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: talos-image-factory
    app.kubernetes.io/name: image-factory
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
