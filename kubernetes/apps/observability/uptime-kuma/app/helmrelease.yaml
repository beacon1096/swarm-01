---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
spec:
  chartRef:
    kind: OCIRepository
    name: uptime-kuma
  interval: 1h
  values:
    defaultPodOptions:
      # Pin to virt-02 so the RWO PVC stays on a fixed Harvester host
      nodeSelector:
        kubernetes.io/hostname: virt-02
    controllers:
      uptime-kuma:
        containers:
          app:
            image:
              repository: registry.beaco.works/docker.io/louislam/uptime-kuma
              tag: 2.2.0
            env:
              UPTIME_KUMA_PORT: "3001"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3001
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3001
                  initialDelaySeconds: 15
                  periodSeconds: 10

    service:
      app:
        controller: uptime-kuma
        ports:
          http:
            port: 3001

    persistence:
      data:
        enabled: true
        storageClass: harvester
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /app/data
