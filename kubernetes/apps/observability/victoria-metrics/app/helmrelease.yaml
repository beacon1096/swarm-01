---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  interval: 1h
  values:
    # -- VM Operator: auto-convert Prometheus CRDs (ServiceMonitor, PodMonitor, etc.)
    victoria-metrics-operator:
      enabled: true
      image:
        tag: v0.68.2
      operator:
        disable_prometheus_converter: false
      env:
        - name: VM_CONTAINERREGISTRY
          value: registry.beaco.works/docker.io
        - name: VM_VMSINGLEDEFAULT_IMAGE
          value: registry.beaco.works/docker.io/victoriametrics/victoria-metrics
        - name: VM_VMAGENTDEFAULT_IMAGE
          value: registry.beaco.works/docker.io/victoriametrics/vmagent
        - name: VM_VMALERTDEFAULT_IMAGE
          value: registry.beaco.works/docker.io/victoriametrics/vmalert
        - name: VM_CONFIG_RELOADER_IMAGE
          value: registry.beaco.works/docker.io/victoriametrics/operator:config-reloader-v0.68.2
        - name: VM_VMALERTMANAGER_ALERTMANAGERDEFAULTBASEIMAGE
          value: registry.beaco.works/docker.io/prom/alertmanager

    # -- VMSingle: metrics storage (single binary, much lighter than Prometheus)
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "90d"
        replicaCount: 1
        # Pin to virt-02 so the RWO PVC stays on a fixed Harvester host
        # (Harvester CSI hot-plug bug surfaces when this volume migrates between VMs)
        nodeSelector:
          kubernetes.io/hostname: virt-02
        storage:
          accessModes: ["ReadWriteOnce"]
          storageClassName: harvester
          resources:
            requests:
              storage: 20Gi

    # -- Do NOT use cluster mode for a small homelab
    vmcluster:
      enabled: false

    # -- VMAgent: lightweight metrics scraper
    vmagent:
      enabled: true
      spec:
        scrapeInterval: 30s
        selectAllByDefault: true
        externalLabels:
          cluster: swarm-01

    # -- VMAlert: alerting rules evaluation
    vmalert:
      enabled: true
      spec:
        selectAllByDefault: true
        evaluationInterval: 30s

    # -- Alertmanager
    alertmanager:
      enabled: true
      spec:
        replicaCount: 1

    # -- Grafana
    grafana:
      enabled: true
      image:
        registry: registry.beaco.works
        repository: docker.io/grafana/grafana
      # Pin to virt-01 so the RWO PVC stays on a fixed Harvester host
      nodeSelector:
        kubernetes.io/hostname: virt-01
      deploymentStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      initChownData:
        image:
          registry: registry.beaco.works
          repository: docker.io/library/busybox
          tag: "1.36"
      plugins:
        - victoriametrics-metrics-datasource
        - victoriametrics-logs-datasource
      persistence:
        enabled: true
        storageClassName: harvester
        size: 2Gi
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL
    defaultDatasources:
      extra:
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          url: http://victoria-logs-server.observability.svc:9428
          isDefault: false

    # -- Default dashboards and alerting rules
    defaultDashboards:
      enabled: true
    defaultRules:
      create: true

    # -- Scrapers that work on Talos
    kubelet:
      enabled: true
    kubeApiServer:
      enabled: true
    coreDns:
      enabled: true
    kube-state-metrics:
      enabled: true
    prometheus-node-exporter:
      enabled: true

    # -- Disable scrapers that DON'T work on Talos Linux
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false
