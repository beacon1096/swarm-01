---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
spec:
  chartRef:
    kind: OCIRepository
    name: navidrome
  interval: 1h
  values:
    controllers:
      navidrome:
        containers:
          app:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: "0.55.1"
            env:
              ND_SCANSCHEDULE: "1h"
              ND_LOGLEVEL: info
              ND_SESSIONTIMEOUT: 24h
              ND_PORT: "4533"
              ND_MUSICFOLDER: /music
              ND_DATAFOLDER: /data
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 4533
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 4533
                  initialDelaySeconds: 15
                  periodSeconds: 10

    service:
      app:
        controller: navidrome
        ports:
          http:
            port: 4533

    persistence:
      data:
        enabled: true
        storageClass: harvester
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /data
      music:
        enabled: true
        storageClass: harvester
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /music
