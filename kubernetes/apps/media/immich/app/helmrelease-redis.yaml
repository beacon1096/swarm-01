---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-redis
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  values:
    controllers:
      redis:
        containers:
          app:
            image:
              repository: docker.io/redis
              tag: "7-alpine"
            ports:
              - containerPort: 6379
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["redis-cli", "ping"]
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["redis-cli", "ping"]
                  initialDelaySeconds: 5
                  periodSeconds: 10
    service:
      app:
        controller: redis
        ports:
          redis:
            port: 6379
