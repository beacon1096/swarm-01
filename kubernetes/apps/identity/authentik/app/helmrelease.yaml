---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chart:
    spec:
      chart: authentik
      version: 2025.4.0
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
  interval: 1h
  values:
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: pg-password
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: secret-key
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: smtp-password
    authentik:
      log_level: info
      email:
        host: mail.beacoworks.xyz
        port: 587
        username: account
        use_tls: true
        use_ssl: false
        timeout: 10
        from: "account@beacoworks.xyz"
      postgresql:
        host: authentik-postgresql
        name: authentik
        user: authentik
    server:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      ingress:
        enabled: false
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/postgresql
        tag: 16-debian-12
      auth:
        username: authentik
        database: authentik
        existingSecret: authentik-secret
        secretKeys:
          adminPasswordKey: pg-password
          userPasswordKey: pg-password
      primary:
        persistence:
          enabled: true
          storageClass: harvester
          size: 8Gi
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/redis
        tag: 7-debian-12
      architecture: standalone
      auth:
        enabled: false
