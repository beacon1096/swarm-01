---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atuin
spec:
  chart:
    spec:
      chart: app-template
      version: "4.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 1h
  dependsOn:
    - name: atuin-postgresql
  values:
    controllers:
      atuin:
        containers:
          app:
            image:
              repository: ghcr.io/atuinsh/atuin
              tag: v18.13.3
            args: ["start"]
            env:
              ATUIN_HOST: "0.0.0.0"
              ATUIN_PORT: "8888"
              ATUIN_OPEN_REGISTRATION: "false"
              ATUIN_DB_URI:
                valueFrom:
                  secretKeyRef:
                    name: atuin-secret
                    key: db-uri
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: atuin
        ports:
          http:
            port: 8888

    ingress:
      app:
        enabled: false
