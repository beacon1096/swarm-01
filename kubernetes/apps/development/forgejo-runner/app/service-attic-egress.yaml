---
# Routes to attic on talos-ii via tailscale operator egress proxy.
# The operator creates a proxy pod that relays traffic to
# attic.tail5d550.ts.net, making attic reachable from any pod
# on talos-i (including DinD containers spawned by forgejo-runner).
apiVersion: v1
kind: Service
metadata:
  name: attic-ts
  annotations:
    tailscale.com/tailnet-fqdn: "attic.tail5d550.ts.net"
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
