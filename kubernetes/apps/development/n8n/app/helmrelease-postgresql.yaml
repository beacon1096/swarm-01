---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n-postgresql
spec:
  chart:
    spec:
      chart: postgresql
      version: "16.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
  interval: 1h
  values:
    image:
      registry: docker.io
      repository: bitnami/postgresql
      digest: sha256:7a695433df7728a4efa0c66310f4e9e71a37f3fbbc1bb179b8308896dff40a6c
    auth:
      username: n8n
      database: n8n
      existingSecret: n8n-secret
      secretKeys:
        adminPasswordKey: pg-superuser-password
        userPasswordKey: pg-password
    primary:
      persistence:
        enabled: true
        storageClass: harvester
        size: 5Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
