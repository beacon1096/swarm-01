---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
spec:
  chart:
    spec:
      chart: coder
      version: "2.31.2"
      sourceRef:
        kind: HelmRepository
        name: coder-v2
  interval: 1h
  dependsOn:
    - name: coder-postgresql
  values:
    coder:
      env:
        - name: CODER_ACCESS_URL
          value: "https://code.${SECRET_DOMAIN}"
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.code.${SECRET_DOMAIN}"
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: pg-connection-url
        # OIDC — Authentik
        # 先在 Authentik 创建 OAuth2/OIDC Provider + Application，然后填入 secret
        - name: CODER_OIDC_ISSUER_URL
          value: "https://id.${SECRET_DOMAIN}/application/o/coder/"
        - name: CODER_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: oidc-client-id
        - name: CODER_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: oidc-client-secret
        - name: CODER_OIDC_SCOPES
          value: "openid,profile,email"
        - name: CODER_OIDC_USERNAME_FIELD
          value: "preferred_username"
        - name: CODER_OIDC_EMAIL_DOMAIN
          value: "${SECRET_DOMAIN}"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      service:
        type: ClusterIP
        port: 8080
