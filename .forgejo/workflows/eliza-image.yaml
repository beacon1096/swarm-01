---
name: "eliza-image"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - images/eliza-runtime/**
      - scripts/eliza-image-build.sh
      - .forgejo/workflows/eliza-image.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ZOT_REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push image
        shell: bash
        env:
          IMAGE_REF: ${{ vars.ZOT_REGISTRY }}/custom/eliza-runtime:sha-${{ github.sha }}
          PLATFORM: linux/amd64
          CONTAINER_ENGINE: docker
          PUSH: "true"
        run: bash ./scripts/eliza-image-build.sh
