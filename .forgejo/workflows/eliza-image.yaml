---
name: "eliza-image"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - images/eliza-runtime/**
      - scripts/eliza-image-build.sh
      - .forgejo/workflows/eliza-image.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.ZOT_REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push image
        shell: bash
        env:
          IMAGE_REF: ${{ vars.ZOT_REGISTRY }}/custom/eliza-runtime:sha-${{ github.sha }}
          PLATFORM: linux/amd64
          CONTAINER_ENGINE: docker
          PUSH: "true"
        run: bash ./scripts/eliza-image-build.sh
