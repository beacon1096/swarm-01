---
name: "mem0-image"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - images/mem0-api-server/**
      - scripts/mem0-image-build.sh
      - .forgejo/workflows/mem0-image.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.ZOT_REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push image
        shell: bash
        env:
          IMAGE_REF: ${{ vars.ZOT_REGISTRY }}/custom/mem0-api-server:sha-${{ github.sha }}
          PLATFORM: linux/amd64
          CONTAINER_ENGINE: docker
          PUSH: "true"
        run: bash ./scripts/mem0-image-build.sh
