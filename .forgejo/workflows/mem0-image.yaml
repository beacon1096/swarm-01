---
name: "mem0-image"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - images/mem0-api-server/**
      - scripts/mem0-image-build.sh
      - .forgejo/workflows/mem0-image.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ZOT_REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push image
        shell: bash
        env:
          IMAGE_REF: ${{ vars.ZOT_REGISTRY }}/custom/mem0-api-server:sha-${{ github.sha }}
          PLATFORM: linux/amd64
          CONTAINER_ENGINE: docker
          PUSH: "true"
        run: bash ./scripts/mem0-image-build.sh
