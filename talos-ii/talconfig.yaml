---
clusterName: talos-ii

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.20.0.100:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.20.0.100"
additionalMachineCertSans: *sans

clusterPodNets: ["10.44.0.0/16"]
clusterSvcNets: ["10.45.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "talos-ii-01"
    ipAddress: "10.20.0.11"
    installDiskSelector:
      transport: "virtio"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/17bd088c71807ae797c16e85efb133b27814f1a333312bf597c3d4bc6f7c13d7
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "06:aa:3d:eb:0e:58"
        dhcp: false
        addresses:
          - "10.20.0.11/24"
        routes:
          - gateway: "10.20.0.1"
            network: 0.0.0.0/0
        mtu: 1400
        vip:
          ip: "10.20.0.100"
  - hostname: "talos-ii-02"
    ipAddress: "10.20.0.12"
    installDiskSelector:
      transport: "virtio"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/17bd088c71807ae797c16e85efb133b27814f1a333312bf597c3d4bc6f7c13d7
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "52:d1:21:5c:22:89"
        dhcp: false
        addresses:
          - "10.20.0.12/24"
        routes:
          - gateway: "10.20.0.1"
            network: 0.0.0.0/0
        mtu: 1400
        vip:
          ip: "10.20.0.100"
  - hostname: "talos-ii-03"
    ipAddress: "10.20.0.13"
    installDiskSelector:
      transport: "virtio"
    machineSpec:
      secureboot: true
    talosImageURL: factory.talos.dev/installer-secureboot/17bd088c71807ae797c16e85efb133b27814f1a333312bf597c3d4bc6f7c13d7
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "ba:c9:59:52:c2:2c"
        dhcp: false
        addresses:
          - "10.20.0.13/24"
        routes:
          - gateway: "10.20.0.1"
            network: 0.0.0.0/0
        mtu: 1400
        vip:
          ip: "10.20.0.100"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/machine-registries.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
