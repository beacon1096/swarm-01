---
name: "eliza-image"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: false
        default: "manual"
      push_image:
        description: "Push image to registry"
        required: false
        type: boolean
        default: true
  push:
    branches: ["main"]
    paths:
      - images/eliza-runtime/**
      - scripts/eliza-image-build.sh
      - .github/workflows/eliza-image.yaml
  pull_request:
    branches: ["main"]
    paths:
      - images/eliza-runtime/**
      - scripts/eliza-image-build.sh
      - .github/workflows/eliza-image.yaml

jobs:
  build:
    name: Build Eliza image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEFAULT_REGISTRY: 172.16.107.41:5000
      DEFAULT_REPOSITORY: custom/eliza-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve image reference
        id: meta
        shell: bash
        run: |
          registry="${{ vars.ZOT_REGISTRY }}"
          if [[ -z "${registry}" ]]; then
            registry="${DEFAULT_REGISTRY}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="sha-${GITHUB_SHA::12}"
          fi

          echo "image_ref=${registry}/${DEFAULT_REPOSITORY}:${tag}" >> "${GITHUB_OUTPUT}"

          push_image="false"
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            push_image="true"
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.push_image }}" == "false" ]]; then
            push_image="false"
          fi
          echo "push_image=${push_image}" >> "${GITHUB_OUTPUT}"

      - name: Login to registry
        if: steps.meta.outputs.push_image == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.ZOT_REGISTRY != '' && vars.ZOT_REGISTRY || env.DEFAULT_REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build image
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
          PLATFORM: linux/amd64
          CONTAINER_ENGINE: docker
          PUSH: ${{ steps.meta.outputs.push_image }}
        run: bash ./scripts/eliza-image-build.sh
